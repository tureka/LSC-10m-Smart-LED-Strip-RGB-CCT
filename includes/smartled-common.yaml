sensor:
  - platform: adc
    id: mic
    pin: ADC3
    internal: false
    name: "Mic"
    update_interval: 50ms
    filters:
      - lambda: |-
          float gain = id(mic_sensitivity).state; 
          return x * gain;
      - lambda: |-
          float gain = id(mic_sensitivity).state;
          float noise = id(mic_noise_floor).state;
          float v = (x - noise);
          if (v < 0) v = 0;
          return v * gain;

number:
  - platform: template
    name: "MIC Sensitivity"
    id: mic_sensitivity
    min_value: 0.1
    max_value: 5.0
    step: 0.1
    optimistic: true
    initial_value: 2.5

  - platform: template
    id: mic_noise_floor
    name: "MIC noise floor level"
    min_value: 0.0
    max_value: 0.2
    step: 0.01
    optimistic: true
    initial_value: 0

  - platform: template
    id: led_length
    name: "LED length"
    min_value: 1
    max_value: 100  # sets the maximum
    step: 1
    optimistic: true
    initial_value: 50

globals:
  - id: cct_brightness  # Brightness CCT Lamp
    type: float
    initial_value: '1.0'
  - id: cct_temp        # Color temperature CCT Lamp, 0=cold 1=warm
    type: float
    initial_value: '1'
  - id: button_press_time
    type: int
    initial_value: '0'
  - id: active_light
    type: int
    restore_value: no
    initial_value: '0'   # 0 = CCT, 1 = RGB
  - id: current_effect_index
    type: int
    restore_value: no
    initial_value: '0'
  - id: cct_temp_index
    type: int
    initial_value: '0'
  - id: rgb_just_turned_on
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: current_effect_name
    type: std::string
    restore_value: no
    initial_value: "\"Rainbow_S4\""
  - id: effect_order
    type: std::vector<std::string>
    restore_value: no
    initial_value: '{ "Rainbow","Scan","ColorWipe","Twinkle","RandomTwinkle","Fireworks","Pulse","Random","Sound Rainbow Effect","Sound Pulse Effect","Sound Fireworks Effect","Sound Bass Flash Effect" }'
  - id: color_order
    type: std::vector<std::array<float,3>>
    restore_value: no
    initial_value: '{ {100,0,0}, {0,100,0}, {0,0,100}, {100,40,0}, {50,100,0}, {0,100,100}, {100,100,0}, {0,80,100}, {100,0,100} }'
                    #     {100,   0,   0},   // RED
                    #     {  0, 100,   0},   // GREEN
                    #     {  0,   0, 100},   // BLUE
                    #     {100,  40,   0},   // ORANGE
                    #     { 50, 100,   0},   // LIGHT GREEN
                    #     {  0, 100, 100},   // CYAN (jasny)
                    #     {100, 100,   0},   // YELLOW
                    #     {  0,  80, 100},   // TEAL (ciemniejszy)
                    #     {100,   0, 100}    // PURPLE
  - id: current_color_index
    type: int
    restore_value: no
    initial_value: '0'
  - id: active_timer
    type: int
    restore_value: no
    initial_value: '-1'   # -1 = no active timer

script:
  - id: next_effect
    mode: restart
    then:
      - lambda: |-
          auto &list = id(effect_order);

          // If RGB was just turned on → set start effect
          if (id(rgb_just_turned_on)) {
            id(rgb_just_turned_on) = false;

            id(current_effect_index) = 0;     // Rainbow
            auto call = id(rgb_light).make_call();
            call.set_effect("Rainbow_S4");
            call.perform();
            return;
          }

          // Normal effect switching
          id(current_effect_index)++;
          if (id(current_effect_index) >= list.size())
            id(current_effect_index) = 0;

          std::string base = list[id(current_effect_index)];
          std::string next = base;

          // Effects with speed → always on S4
          if (base != "Random" &&
              base != "Sound Rainbow Effect" &&
              base != "Sound Pulse Effect" &&
              base != "Sound Fireworks Effect" &&
              base != "Sound Bass Flash Effect") {
            next = base + "_S4";
          }

          id(current_effect_name) = next;

          auto call = id(rgb_light).make_call();
          call.set_effect(next);
          call.perform();

  - id: speed_up
    mode: restart
    then:
      - lambda: |-
          std::string current = id(current_effect_name);

          // Effects without speed
          if (current == "Random" ||
              current == "Sound Rainbow Effect" ||
              current == "Sound Pulse Effect" ||
              current == "Sound Fireworks Effect" ||
              current == "Sound Bass Flash Effect") {
            return;
          }

          size_t pos = current.find("_S");
          if (pos == std::string::npos) return;

          std::string base = current.substr(0, pos);
          int num = atoi(current.substr(pos + 2).c_str());

          if (num < 7) num++;

          std::string next = base + "_S" + std::to_string(num);

          id(current_effect_name) = next;

          auto call = id(rgb_light).make_call();
          call.set_effect(next);
          call.perform();

  - id: speed_down
    mode: restart
    then:
      - lambda: |-
          std::string current = id(current_effect_name);

          // Effects without speed
          if (current == "Random" ||
              current == "Sound Rainbow Effect" ||
              current == "Sound Pulse Effect" ||
              current == "Sound Fireworks Effect" ||
              current == "Sound Bass Flash Effect") {
            return;
          }

          size_t pos = current.find("_S");
          if (pos == std::string::npos) return;

          std::string base = current.substr(0, pos);
          int num = atoi(current.substr(pos + 2).c_str());

          if (num > 1) num--;

          std::string next = base + "_S" + std::to_string(num);

          id(current_effect_name) = next;

          auto call = id(rgb_light).make_call();
          call.set_effect(next);
          call.perform();

  - id: next_color
    mode: restart
    then:
      - lambda: |-
          auto &colors = id(color_order);

          id(current_color_index)++;
          if (id(current_color_index) >= colors.size())
            id(current_color_index) = 0;

          auto c = colors[id(current_color_index)];

          auto call = id(rgb_light).make_call();
          call.set_rgb(c[0] / 100.0f, c[1] / 100.0f, c[2] / 100.0f);
          call.perform();

  - id: prev_color
    mode: restart
    then:
      - lambda: |-
          auto &colors = id(color_order);

          id(current_color_index)--;
          if (id(current_color_index) < 0)
            id(current_color_index) = colors.size() - 1;

          auto c = colors[id(current_color_index)];

          auto call = id(rgb_light).make_call();
          call.set_rgb(c[0] / 100.0f, c[1] / 100.0f, c[2] / 100.0f);
          call.perform();

  - id: apply_color
    mode: restart
    then:
      - lambda: |-
          auto &colors = id(color_order);
          auto c = colors[id(current_color_index)];

          auto call = id(rgb_light).make_call();
          call.set_rgb(c[0] / 100.0f, c[1] / 100.0f, c[2] / 100.0f);
          call.perform();

  - id: next_cct_temp
    mode: restart
    then:
      - lambda: |-
          const float temps_mired[3] = {
            1000000.0f / 2700.0f,
            1000000.0f / 4000.0f,
            1000000.0f / 6500.0f
          };

          id(cct_temp_index)++;
          if (id(cct_temp_index) > 2)
            id(cct_temp_index) = 0;

          auto call = id(cct_light).make_call();
          call.set_color_temperature(temps_mired[id(cct_temp_index)]);
          call.perform();

  - id: timer_1h_script
    mode: restart
    then:
      - lambda: |-
          id(active_timer) = 1;
      - delay: 1h
      - lambda: |-
          if (id(active_timer) != 1) return;
      - light.turn_off: rgb_light
      - light.turn_off: cct_light
      - lambda: |-
          id(active_timer) = -1;

  - id: timer_2h_script
    mode: restart
    then:
      - lambda: |-
          id(active_timer) = 2;
      - delay: 2h
      - lambda: |-
          if (id(active_timer) != 2) return;
      - light.turn_off: rgb_light
      - light.turn_off: cct_light
      - lambda: |-
          id(active_timer) = -1;

  - id: timer_3h_script
    mode: restart
    then:
      - lambda: |-
          id(active_timer) = 3;
      - delay: 3h
      - lambda: |-
          if (id(active_timer) != 3) return;
      - light.turn_off: rgb_light
      - light.turn_off: cct_light
      - lambda: |-
          id(active_timer) = -1;

output:
  - platform: gpio   # output is a power-relay, to switch the LED strip
    id: power    
    pin: P22

# Template CCT
  - platform: template
    id: cct_temp_out
    type: float
    write_action:
      - lambda: |-
          id(cct_temp) = state;
          float cw = 1.0f - state;   // cold
          float ww = state;          // warm
          auto call = id(cct_raw).make_call();
          call.set_state(true);
          call.set_brightness(id(cct_brightness));
          call.set_red_if_supported(cw);
          call.set_green_if_supported(ww);
          call.set_blue_if_supported(0.0f);
          call.perform();

  - platform: template
    id: cct_bri_out
    type: float
    write_action:
      - lambda: |-
          id(cct_brightness) = state;
          float cw = 1.0f - id(cct_temp);
          float ww = id(cct_temp);
          auto call = id(cct_raw).make_call();
          call.set_state(true);
          call.set_brightness(state);
          call.set_red_if_supported(cw);
          call.set_green_if_supported(ww);
          call.set_blue_if_supported(0.0f);
          call.perform();

light:
  #  Real strip SM16703
  - platform: beken_spi_led_strip
    id: RGBIC_CCTIC_ledstrip
    rgb_order: GRB
    pin: 16
    num_leds: 100
    chipset: SM16703
    name: None
    internal: true

  - platform: color_temperature
    id: cct_light
    name: "CCT"
    color_temperature: cct_temp_out
    brightness: cct_bri_out
    warm_white_color_temperature: 2700 K
    cold_white_color_temperature: 6500 K
    default_transition_length: 0s
    on_turn_on:
      then:
        - if:
            condition:
              light.is_on: rgb_light
            then:
              - light.turn_off: rgb_light
        - output.turn_on: power

    on_turn_off:
      then:
        - if:
            condition:
              # light.is_off: rgb_light
              lambda: 'return id(active_light) == 0;'
            then:
              - delay: 0.2s
              - output.turn_off: power

  - platform: partition
    id: rgb_light
    name: "RGB"
    internal: false
    default_transition_length: 0s

    on_turn_on:
      then:
        - if:
            condition:
              light.is_on: cct_light
            then:
              - light.turn_off: cct_light
        - output.turn_on: power
        - lambda: |-
            id(rgb_just_turned_on) = true;
    on_turn_off:
      then:
        - if:
            condition:
              # light.is_off: cct_light
              lambda: 'return id(active_light) == 1;'
            then:
              - delay: 0.2s
              - output.turn_off: power

    effects:
          # Rainbow (speed — higher = faster)
          - addressable_rainbow: { name: "Rainbow_S1", speed: 5 }
          - addressable_rainbow: { name: "Rainbow_S2", speed: 10 }
          - addressable_rainbow: { name: "Rainbow_S3", speed: 20 }
          - addressable_rainbow: { name: "Rainbow_S4", speed: 40 }
          - addressable_rainbow: { name: "Rainbow_S5", speed: 60 }
          - addressable_rainbow: { name: "Rainbow_S6", speed: 90 }
          - addressable_rainbow: { name: "Rainbow_S7", speed: 120 }

          # Scan (move_interval — lower = faster)
          - addressable_scan: { name: "Scan_S1", move_interval: 200ms }
          - addressable_scan: { name: "Scan_S2", move_interval: 150ms }
          - addressable_scan: { name: "Scan_S3", move_interval: 100ms }
          - addressable_scan: { name: "Scan_S4", move_interval: 70ms }
          - addressable_scan: { name: "Scan_S5", move_interval: 50ms }
          - addressable_scan: { name: "Scan_S6", move_interval: 30ms }
          - addressable_scan: { name: "Scan_S7", move_interval: 15ms }

          # Color Wipe (add_led_interval — lower = faster)
          - addressable_color_wipe: { name: "ColorWipe_S1", add_led_interval: 200ms }
          - addressable_color_wipe: { name: "ColorWipe_S2", add_led_interval: 150ms }
          - addressable_color_wipe: { name: "ColorWipe_S3", add_led_interval: 100ms }
          - addressable_color_wipe: { name: "ColorWipe_S4", add_led_interval: 70ms }
          - addressable_color_wipe: { name: "ColorWipe_S5", add_led_interval: 50ms }
          - addressable_color_wipe: { name: "ColorWipe_S6", add_led_interval: 30ms }
          - addressable_color_wipe: { name: "ColorWipe_S7", add_led_interval: 15ms }

          # Twinkle (progress_interval — lower = faster)
          - addressable_twinkle: { name: "Twinkle_S1", progress_interval: 200ms }
          - addressable_twinkle: { name: "Twinkle_S2", progress_interval: 150ms }
          - addressable_twinkle: { name: "Twinkle_S3", progress_interval: 100ms }
          - addressable_twinkle: { name: "Twinkle_S4", progress_interval: 70ms }
          - addressable_twinkle: { name: "Twinkle_S5", progress_interval: 50ms }
          - addressable_twinkle: { name: "Twinkle_S6", progress_interval: 30ms }
          - addressable_twinkle: { name: "Twinkle_S7", progress_interval: 15ms }

          # Random Twinkle (progress_interval — lower = faster)
          - addressable_random_twinkle: { name: "RandomTwinkle_S1", progress_interval: 200ms }
          - addressable_random_twinkle: { name: "RandomTwinkle_S2", progress_interval: 150ms }
          - addressable_random_twinkle: { name: "RandomTwinkle_S3", progress_interval: 100ms }
          - addressable_random_twinkle: { name: "RandomTwinkle_S4", progress_interval: 70ms }
          - addressable_random_twinkle: { name: "RandomTwinkle_S5", progress_interval: 50ms }
          - addressable_random_twinkle: { name: "RandomTwinkle_S6", progress_interval: 30ms }
          - addressable_random_twinkle: { name: "RandomTwinkle_S7", progress_interval: 15ms }

          # Fireworks (update_interval — lower = faster)
          - addressable_fireworks: { name: "Fireworks_S1", update_interval: 200ms }
          - addressable_fireworks: { name: "Fireworks_S2", update_interval: 150ms }
          - addressable_fireworks: { name: "Fireworks_S3", update_interval: 100ms }
          - addressable_fireworks: { name: "Fireworks_S4", update_interval: 70ms }
          - addressable_fireworks: { name: "Fireworks_S5", update_interval: 50ms }
          - addressable_fireworks: { name: "Fireworks_S6", update_interval: 30ms }
          - addressable_fireworks: { name: "Fireworks_S7", update_interval: 15ms }

          # Pulse (transition_length — lower = faster)
          - pulse: { name: "Pulse_S1", transition_length: 3000ms }
          - pulse: { name: "Pulse_S2", transition_length: 2600ms }
          - pulse: { name: "Pulse_S3", transition_length: 2200ms }
          - pulse: { name: "Pulse_S4", transition_length: 1800ms }
          - pulse: { name: "Pulse_S5", transition_length: 1500ms }
          - pulse: { name: "Pulse_S6", transition_length: 1300ms }
          - pulse: { name: "Pulse_S7", transition_length: 1100ms }

          # Random (transition_length — lower = faster)
          - random: { name: "Random", transition_length: 200ms }

          - addressable_lambda:
              name: "Sound Rainbow Effect"
              update_interval: 50ms
              lambda: |-
                float mic_level = id(mic).get_state();
                float normalized = min(mic_level, 1.0f);
                int length = id(led_length).state;
                int strip_size = it.size();
                if (length > strip_size) length = strip_size;
                int center = length / 2;
                int max_distance = floor(normalized * (length / 2));
                for (int i = 0; i < strip_size; i++) {
                  if (i % 2 == 1) {
                    it[i] = Color(0,0,0);
                    continue;
                  }
                  if (i >= length) {
                    it[i] = Color(0,0,0);
                    continue;
                  }
                  int distance = abs(i - center);
                  if (distance <= max_distance) {
                    float hue = (float)i / length * 360.0f;
                    float h = hue;
                    float s = 1.0f;
                    float v = 1.0f;
                    int sector = ((int)floor(h / 60.0f)) % 6;
                    float f = (h / 60.0f) - floor(h / 60.0f);
                    float p = v * (1.0f - s);
                    float q = v * (1.0f - f * s);
                    float t = v * (1.0f - (1.0f - f) * s);
                    float r,g,b;
                    if (sector == 0) { r=v; g=t; b=p; }
                    else if (sector == 1) { r=q; g=v; b=p; }
                    else if (sector == 2) { r=p; g=v; b=t; }
                    else if (sector == 3) { r=p; g=q; b=v; }
                    else if (sector == 4) { r=t; g=p; b=v; }
                    else { r=v; g=p; b=q; }
                    it[i] = Color(r*255, g*255, b*255);
                  } else {
                    it[i] = Color(0,0,0);
                  }
                }
          - addressable_lambda:
              name: "Sound Pulse Effect"
              update_interval: 30ms
              lambda: |-
                float mic_level = id(mic).get_state();
                float v = min(mic_level * 3.0f, 1.0f);
                int length = id(led_length).state;
                int strip_size = it.size();
                if (length > strip_size) length = strip_size;
                for (int i = 0; i < strip_size; i++) {
                  if (i % 2 == 1) {
                    it[i] = Color(0,0,0);
                    continue;
                  }
                  if (i >= length) {
                    it[i] = Color(0,0,0);
                    continue;
                  }
                  uint8_t r = 255 * v;
                  uint8_t g = 40 * v;
                  uint8_t b = 40 * v;
                  it[i] = Color(r, g, b);
                }
          - addressable_lambda:
              name: "Sound Fireworks Effect"
              update_interval: 40ms
              lambda: |-
                float mic_level = id(mic).get_state();
                int length = id(led_length).state;
                int strip_size = it.size();
                if (length > strip_size) length = strip_size;
                for (int i = 0; i < strip_size; i++) {
                  if (i % 2 == 1) {
                    it[i] = Color(0,0,0);
                    continue;
                  }
                  if (i >= length) {
                    it[i] = Color(0,0,0);
                    continue;
                  }
                  if (mic_level > 0.12f && random_float() < mic_level) {
                    uint8_t r = random_uint32() % 256;
                    uint8_t g = random_uint32() % 256;
                    uint8_t b = random_uint32() % 256;
                    it[i] = Color(r, g, b);
                  } else {
                    it[i] = Color(0,0,0);
                  }
                }
          - addressable_lambda:
              name: "Sound Bass Flash Effect"
              update_interval: 25ms
              lambda: |-
                float mic_level = id(mic).get_state();
                int length = id(led_length).state;
                int strip_size = it.size();
                if (length > strip_size) length = strip_size;
                bool flash = mic_level > 0.18f;
                for (int i = 0; i < strip_size; i++) {
                  if (i % 2 == 1) {
                    it[i] = Color(0,0,0);
                    continue;
                  }
                  if (i >= length) {
                    it[i] = Color(0,0,0);
                    continue;
                  }
                  if (flash) {
                    it[i] = Color(255,255,255);
                  } else {
                    it[i] = Color(0,0,0);
                  }
                }

