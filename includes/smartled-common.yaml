remote_receiver:
  pin:
    number: P26
    inverted: true
    mode:
      input: true
      pullup: true
  # dump: nec
  idle: 20ms
  buffer_size: 1kb

button:
  # SHORT CLICK
  - platform: template
    name: "Button - Short click"
    id: ha_short_click
    icon: "mdi:gesture-tap"
    on_press:
      then:
        - lambda: |-
            if (id(cct_light).current_values.is_on()) {
              id(active_light) = 0;
              id(next_cct_temp).execute();
              return;
            }

            if (id(rgb_light).current_values.is_on()) {
              id(active_light) = 1;
              id(next_effect).execute();
              return;
            }

  # LONG CLICK
  - platform: template
    name: "Button - Long click"
    id: ha_long_click
    icon: "mdi:gesture-tap-hold"
    on_press:
      then:
        - lambda: |-
            bool rgb_on = id(rgb_light).current_values.is_on();
            bool cct_on = id(cct_light).current_values.is_on();

            if (!rgb_on && !cct_on) {
              id(active_light) = 0;
              id(cct_light).turn_on().perform();
              return;
            }
            if (cct_on) {
              id(active_light) = 1;
              id(cct_light).turn_off().perform();
              id(rgb_light).turn_on().perform();
              return;
            }
            if (rgb_on) {
              id(active_light) = 0;
              id(rgb_light).turn_off().perform();
              return;
            }

binary_sensor:
  - platform: gpio
    id: btn_input
    pin:
      number: P9
      mode: INPUT_PULLUP
      inverted: true
    name: "Button"

    on_press:
      then:
        - lambda: |-
            id(button_press_time) = millis();

    on_release:
      then:
        - lambda: |-
            int duration = millis() - id(button_press_time);

            // LONG CLICK (>600 ms)
            if (duration > 600) {
              bool rgb_on = id(rgb_light).current_values.is_on();
              bool cct_on = id(cct_light).current_values.is_on();

              if (!rgb_on && !cct_on) {
                id(active_light) = 0;
                id(cct_light).turn_on().perform();
                return;
              }
              if (cct_on) {
                id(active_light) = 1;
                id(cct_light).turn_off().perform();
                id(rgb_light).turn_on().perform();
                return;
              }
              if (rgb_on) {
                id(active_light) = 0;
                id(rgb_light).turn_off().perform();
                return;
              }
              return;
            }

            // SHORT CLICK (<400 ms)
            if (duration < 400) {

              // If CCT is on → light temp change
              if (id(cct_light).current_values.is_on()) {
                id(active_light) = 0;
                id(next_cct_temp).execute();
                return;
              }

              // If RGB is on → effect change
              if (id(rgb_light).current_values.is_on()) {
                id(active_light) = 1;
                id(next_effect).execute();
                return;
              }
            }

  # Remote first row
  - platform: remote_receiver
    id: "brightness_up"
    nec:
      address: 0xEF00
      command: 0xE31C
    on_press:
      then:
        - if:
            condition:
              lambda: 'return id(active_light) == 0;'
            then:
              - if:
                  condition:
                    light.is_off: cct_light
                  then:
                    - light.turn_on:
                        id: cct_light
                        brightness: 20%
              - light.dim_relative:
                  id: cct_light
                  relative_brightness: 10%
            else:
              - if:
                  condition:
                    light.is_off: rgb_light
                  then:
                    - light.turn_on:
                        id: rgb_light
                        brightness: 20%
              - light.dim_relative:
                  id: rgb_light
                  relative_brightness: 10%
  - platform: remote_receiver
    id: "brightness_down"
    nec:
      address: 0xEF00
      command: 0xE21D
    on_press:
      then:
        - if:
            condition:
              lambda: 'return id(active_light) == 0;'
            then:
              - light.dim_relative:
                  id: cct_light
                  relative_brightness: -10%
            else:
              - light.dim_relative:
                  id: rgb_light
                  relative_brightness: -10%
  - platform: remote_receiver
    id: "off"
    nec:
      address: 0xEF00
      command: 0xE11E
    on_press:
      then:
        - light.turn_off: rgb_light
        - light.turn_off: cct_light
        - globals.set: { id: active_light, value: '0' }
  - platform: remote_receiver
    id: "on"
    nec:
      address: 0xEF00
      command: 0xE01F
    on_press:
      then:
        - globals.set: { id: active_light, value: '0' }
        - light.turn_off: rgb_light
        - light.turn_on: cct_light

  # Remote second row
  - platform: remote_receiver
    id: "red"
    nec:
      address: 0xEF00
      command: 0xFF00
    on_press:
      then:
        - globals.set: { id: active_light, value: '1' }
        - globals.set: { id: current_color_index, value: '0' }
        - light.turn_on: rgb_light
        - script.execute: apply_color
